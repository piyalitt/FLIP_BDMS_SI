codecov:
  require_ci_to_pass: yes

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 70%
      flip-api:
        flags: [flip-api]
        target: auto
        threshold: 70%
      trust-api:
        flags: [trust-api]
        target: auto
        threshold: 70%
      imaging-api:
        flags: [imaging-api]
        target: auto
        threshold: 70%
      data-access-api:
        flags: [data-access-api]
        target: auto
        threshold: 70%
      flip-ui:
        flags: [flip-ui]
        target: auto
        threshold: 70%
    patch:
      default:
        # Patch coverage is reported but does not block PRs. Strict patch
        # gating produces noisy failures on refactor/format/lint PRs that
        # only reformat existing-but-uncovered lines (codecov treats
        # touched lines as new patch lines). Project coverage above is the
        # real gate.
        informational: true

# Carryforward flags ensure that when only a subset of services change
# (and therefore only a subset of CI workflows run), Codecov inherits the
# most-recent coverage value for the silent flags instead of collapsing
# the combined report to just the uploaded flag.
flag_management:
  default_rules:
    carryforward: true

flags:
  flip-api:
    paths:
      - flip-api/
    carryforward: true
  trust-api:
    paths:
      - trust/trust-api/
    carryforward: true
  imaging-api:
    paths:
      - trust/imaging-api/
    carryforward: true
  data-access-api:
    paths:
      - trust/data-access-api/
    carryforward: true
  flip-ui:
    paths:
      - flip-ui/
    carryforward: true

comment:
  layout: "reach, diff, flags, files"
  require_changes: true
