coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%

# Carryforward flags ensure that when only a subset of sub-projects change
# (and therefore only a subset of CI workflows run), Codecov inherits the
# most-recent coverage value for the silent flags instead of marking the
# combined report as incomplete.
flag_management:
  default_rules:
    carryforward: true

flags:
  flip-api:
    paths:
      - flip-api/
    carryforward: true
  flip-ui:
    paths:
      - flip-ui/
    carryforward: true
  imaging-api:
    paths:
      - trust/imaging-api/
    carryforward: true
  trust-api:
    paths:
      - trust/trust-api/
    carryforward: true
  data-access-api:
    paths:
      - trust/data-access-api/
    carryforward: true
