changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: "🚀 Features"
      labels:
        - enhancement
        - feature
    - title: "🐛 Bug Fixes"
      labels:
        - bug
        - fix
    - title: "📖 Documentation"
      labels:
        - documentation
        - docs
    - title: "🔧 CI / Build"
      labels:
        - ci
        - build
    - title: "🧹 Chores"
      labels:
        - chore
        - dependencies
    - title: "Other Changes"
      labels:
        - "*"
