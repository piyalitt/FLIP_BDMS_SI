name: FLIP Imaging API CI

on:
  push:
    branches: [main, develop]
    paths:
      - "trust/imaging-api/**"
      - ".github/workflows/imaging_api.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "trust/imaging-api/**"
      - ".github/workflows/imaging_api.yml"

jobs:
  imaging-api:
    runs-on: ubuntu-latest
    environment: flip
    defaults:
      run:
        working-directory: ./trust/imaging-api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # get python version from ./trust/imaging-api/.python-version file
          # if not found, use 3.11
          python-version: ${{ github.event.inputs.python-version || '3.11' }}

      - name: Install uv (if used for dependency management)
        run: pip install uv

      - name: Setup environment file
        run: |
          cp ../../.env.development.example ../../.env.development
          # Override sensitive values with GitHub secrets
          echo "AES_KEY_BASE64=${{ secrets.AES_KEY_BASE64 || 'dGVzdC1hZXMta2V5LWZvci1jaS10ZXN0aW5nLTMyYnl0ZXM=' }}" >> ../../.env.development
          echo "PRIVATE_API_KEY=${{ secrets.PRIVATE_API_KEY || 'test-private-api-key-for-ci' }}" >> ../../.env.development
          echo "DATA_ACCESS_POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> ../../.env.development
          echo "OMOP_POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> ../../.env.development
          echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> ../../.env.development
      - name: Run tests with pytest (example)
        run: make local_test
