name: FLIP Central Hub API CI

on:
  push:
    branches: [main, develop]
    paths:
      - "flip-api/**"
      - ".github/workflows/test_flip_api.yml"
  pull_request:
    branches: [main, develop]

jobs:
  flip-api:
    runs-on: ubuntu-latest
    environment: flip
    services:
      # label used to access the service container
      postgres:
        # Docker Hub image
        image: postgres:latest
        # service environment variables
        # `POSTGRES_HOST` is `postgres`
        env:
          # optional (defaults to `postgres`)
          POSTGRES_DB: centralhub
          # required
          POSTGRES_PASSWORD: some_password # pragma: allowlist secret
          # optional (defaults to `5432`)
          POSTGRES_PORT: 5432
          # optional (defaults to `postgres`)
          POSTGRES_USER: local_user
        ports:
          # maps tcp port 5432 on service container to the host
          - 5432:5432
        # set health checks to wait until postgres has started
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: ./flip-api # Set working directory for subsequent steps

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # get python version from ./flip-api/.python-version file
          # if not found, use 3.11
          python-version: ${{ github.event.inputs.python-version || '3.11' }}

      - name: Install uv (if used for dependency management)
        run: pip install uv

      - name: Setup environment file
        run: |
          cp ../.env.development.example ../.env.development
          # Override sensitive values with GitHub secrets
          echo "PRIVATE_API_KEY=${{ secrets.PRIVATE_API_KEY }}" >> ../.env.development
          echo "AES_KEY_BASE64=${{ secrets.AES_KEY_BASE64 }}" >> ../.env.development
          echo "DATA_ACCESS_POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> ../../.env.development
          echo "OMOP_POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> ../../.env.development
          echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> ../../.env.development
          echo "SES_VERIFIED_EMAIL=${{ secrets.SES_VERIFIED_EMAIL }}" >> ../.env.development
          echo "AWS_SES_ADMIN_EMAIL_ADDRESS=${{ secrets.SES_VERIFIED_EMAIL }}" >> ../../.env.development
          echo "AWS_SES_SENDER_EMAIL_ADDRESS=${{ secrets.SES_VERIFIED_EMAIL }}" >> ../../.env.development

      - name: Run unit tests
        run: make unit_test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: flip-api/coverage.xml
          flags: flip-api
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
