# Build-only smoke test for the flip-ui local-dev Dockerfile.
#
# Stag/prod serve the UI from S3 + CloudFront (see deploy/providers/AWS/), so
# nothing pulls a flip-ui image from GHCR. This workflow just proves the
# Dockerfile still builds on the current branch — no push, no tagging.

name: Build flip-ui Docker image (CI smoke test)

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "flip-ui/**"
      - ".github/workflows/docker_build_flip_ui.yml"
  push:
    branches: [main, develop]
    paths:
      - "flip-ui/**"
      - ".github/workflows/docker_build_flip_ui.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./flip-ui
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build -t flip-ui:ci .
