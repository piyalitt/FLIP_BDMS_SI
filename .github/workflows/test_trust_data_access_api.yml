name: Trust - Data Access API CI

on:
  push:
    branches: [main, develop]
    paths:
      - "trust/data-access-api/**"
      - ".github/workflows/test_trust_data_access_api.yml"
  pull_request:
    branches: [main, develop]

jobs:
  data-access-api:
    runs-on: ubuntu-latest
    environment: flip
    defaults:
      run:
        working-directory: ./trust/data-access-api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # get python version from ./trust/data-access-api/.python-version file
          # if not found, use 3.11
          python-version: ${{ github.event.inputs.python-version || '3.11' }}

      - name: Install uv (if used for dependency management)
        run: pip install uv

      - name: Setup environment file
        run: |
          cp ../../.env.development.example ../../.env.development
          # Override sensitive values with GitHub secrets
          echo "AES_KEY_BASE64=${{ secrets.AES_KEY_BASE64 }}" >> ../../.env.development
          echo "PRIVATE_API_KEY=${{ secrets.PRIVATE_API_KEY }}" >> ../../.env.development
          echo "DATA_ACCESS_POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> ../../.env.development
          echo "OMOP_POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> ../../.env.development
          echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> ../../.env.development

      - name: Run tests with pytest (example)
        run: make local_test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: trust/data-access-api/coverage.xml
          flags: data-access-api
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
