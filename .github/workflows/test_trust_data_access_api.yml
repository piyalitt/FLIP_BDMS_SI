name: Trust - Data Access API CI

on:
  push:
    branches: [main, develop]
    paths:
      - "trust/data-access-api/**"
      - "trust/compose.test.yml"
      - "trust/trust-api/tests/integration/fixtures/**"
      - "trust/observability/**"
      - ".github/workflows/test_trust_data_access_api.yml"
      - ".github/actions/setup-trust-test-env/**"
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  data-access-api:
    runs-on: ubuntu-latest
    environment: flip
    defaults:
      run:
        working-directory: ./trust/data-access-api

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup trust test env
        uses: ./.github/actions/setup-trust-test-env
        with:
          python-version: ${{ github.event.inputs.python-version || '3.11' }}
          trust-api-key: ${{ secrets.TRUST_API_KEY }}
          aes-key-base64: ${{ secrets.AES_KEY_BASE64 }}
          postgres-password: ${{ secrets.POSTGRES_PASSWORD }}

      - name: Run tests with pytest (example)
        run: make local_test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: trust/data-access-api/coverage-unit.xml
          flags: data-access-api
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  data-access-api-integration:
    # Drives the data-access-api ``/cohort`` endpoints against a real seeded Postgres
    # via the shared trust/compose.test.yml stack. Catches SQL-template / OMOP-schema
    # / auth regressions that the mocked unit suite cannot. See issue #369 (B3).
    #
    # Steps are split out (not bundled into ``make integration_test``) so a
    # failure shows the actual offending phase in the GitHub Actions UI.
    runs-on: ubuntu-latest
    environment: flip
    defaults:
      run:
        working-directory: ./trust/data-access-api

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup trust test env
        uses: ./.github/actions/setup-trust-test-env
        with:
          python-version: ${{ github.event.inputs.python-version || '3.12' }}
          trust-api-key: ${{ secrets.TRUST_API_KEY || 'test-trust-api-key-for-ci' }}
          aes-key-base64: ${{ secrets.AES_KEY_BASE64 || 'QgZ+TBA0lUxcuCiRPLneFe/JjMaUEUJWHACHHGz2gGA=' }}  # pragma: allowlist secret
          postgres-password: ${{ secrets.POSTGRES_PASSWORD || 'test_password' }}

      - name: Sync data-access-api venv (incl. testcontainers)
        run: uv sync --frozen

      - name: Lint (ruff)
        env:
          BASE_IMAGES_DOWNLOAD_DIR: /tmp/images
        run: uv run ruff check .

      - name: Type check (mypy)
        env:
          BASE_IMAGES_DOWNLOAD_DIR: /tmp/images
        run: uv run mypy . --ignore-missing-imports

      - name: Validate compose file
        working-directory: ./trust
        run: docker compose -f compose.test.yml config --quiet

      - name: Pre-pull base images
        run: |
          docker pull --quiet postgres:16-alpine
          docker pull --quiet python:3.12-slim-bookworm

      - name: Build compose stack (data-access-api image)
        working-directory: ./trust
        run: docker compose -f compose.test.yml build

      - name: Run pytest integration suite
        env:
          BASE_IMAGES_DOWNLOAD_DIR: /tmp/images
        run: uv run pytest ./tests/integration --tb=long --disable-warnings -v --cov=data_access_api/ --cov-report=xml:coverage-integration.xml

      - name: Show data-access-api container logs on failure
        if: failure()
        working-directory: ./trust
        run: |
          echo "::group::data-access-api-test logs"
          docker compose -f compose.test.yml logs data-access-api-test || true
          echo "::endgroup::"
          echo "::group::omop-db-test logs"
          docker compose -f compose.test.yml logs omop-db-test || true
          echo "::endgroup::"

      - name: Upload integration coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: trust/data-access-api/coverage-integration.xml
          flags: data-access-api-integration
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
