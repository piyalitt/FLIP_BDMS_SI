name: Validate PR Source Branch

permissions:
  contents: read

on:
  pull_request:
    # Note: Do NOT add a `branches` filter here (e.g. `branches: [main]`).
    # A branches filter would prevent the workflow from re-running when the
    # PR target is changed away from main, leaving the old failure stuck.
    # Instead, the target branch check is done at runtime in the step below.
    types: [opened, reopened, synchronize, edited]

jobs:
  validate-source-branch:
    name: Ensure PR to main originates from develop
    runs-on: ubuntu-latest

    steps:
      - name: Check source branch
        run: |
          SOURCE_BRANCH="${{ github.head_ref }}"
          TARGET_BRANCH="${{ github.base_ref }}"

          echo "PR Details:"
          echo "  Source branch: ${SOURCE_BRANCH}"
          echo "  Target branch: ${TARGET_BRANCH}"

          if [ "${TARGET_BRANCH}" != "main" ]; then
            echo "✅ SKIPPED: Target branch is not 'main', no restriction applies."
            exit 0
          fi

          if [ "${SOURCE_BRANCH}" != "develop" ]; then
            echo "❌ VALIDATION FAILED"
            echo "PRs to 'main' must originate from 'develop' branch."
            echo "Current source branch: ${SOURCE_BRANCH}"
            exit 1
          fi
          echo "✅ VALIDATION PASSED: PR to main originates from develop"
