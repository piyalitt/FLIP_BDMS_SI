name: Terraform Validate

on:
  push:
    branches: [main, develop]
    paths:
      - "deploy/providers/AWS/**"
      - ".github/workflows/validate_terraform.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "deploy/providers/AWS/**"
      - ".github/workflows/validate_terraform.yml"

permissions:
  contents: read

jobs:
  terraform-validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Both Terraform roots share the modules under deploy/providers/AWS/modules;
        # validating each root exercises the module code from the caller's side.
        root:
          - ./deploy/providers/AWS
          - ./deploy/providers/AWS/dev
    defaults:
      run:
        working-directory: ${{ matrix.root }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.13"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive -diff

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate
