name: UI CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'flip-ui/**'
      - '.github/workflows/ui.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'flip-ui/**'
      - '.github/workflows/ui.yml'

jobs:
  flip-ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./flip-ui

    env:
        VITE_LOCAL: false

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set Node.js version
      uses: actions/setup-node@v4
      with:
        node-version: '20.9.0'  # Specify the Node.js version you need
    - name: Install dependencies
      run: npm install

    - name: Run tests with npm
      run: npm run test:unit
