name: Build and Push Docker Image for Trust API

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths:
      - "trust/trust-api/**"
      - "trust/observability/log_config/**"
      - ".github/workflows/docker_build_trust_trust_api.yml"

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions: # override top-level read-only default to allow GHCR push
      contents: read
      packages: write
    defaults:
      run:
        working-directory: ./trust/trust-api
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: londonaicentre/trust-api
      BUILD_ARGS: |
        --build-arg UID=1000
        --build-arg GID=1000
        --build-arg UNAME=flip
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.workflow_run.head_repository.full_name }}
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Determine tags
        id: tags
        run: |
          TAGS="${REGISTRY}/${IMAGE_NAME}:${{ github.sha }}"

          # Branch name sanitization
          REF_NAME="${{ github.ref_name }}"
          SAFE_REF_NAME=$(echo "$REF_NAME" | sed 's/[^a-zA-Z0-9]/-/g')
          TAGS="${TAGS},${REGISTRY}/${IMAGE_NAME}:${SAFE_REF_NAME}"

          # Branch number (if starts with number)
          if [[ "$REF_NAME" =~ ^[0-9]+ ]]; then
              BRANCH_NUM=$(echo "$REF_NAME" | grep -oE '^[0-9]+')
              TAGS="${TAGS},${REGISTRY}/${IMAGE_NAME}:${BRANCH_NUM}"
          fi

          # PR Number (if PR)
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
             PR_NUMBER=$(echo "${{ github.ref }}" | awk -F / '{print $3}')
             TAGS="${TAGS},${REGISTRY}/${IMAGE_NAME}:pr-${PR_NUMBER}"
          fi

          # Determine if this is a merge/push to main or develop
          BRANCH_NAME=""
          if [[ "${{ github.event_name }}" == "workflow_run" && "${{ github.event.workflow_run.event }}" == "push" ]]; then
            BRANCH_NAME="${{ github.event.workflow_run.head_branch }}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            BRANCH_NAME="${{ github.ref_name }}"
          fi

          if [[ "$BRANCH_NAME" == "main" ]]; then
            TAGS="${TAGS},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:prod"
          elif [[ "$BRANCH_NAME" == "develop" ]]; then
            TAGS="${TAGS},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:stag"
          fi
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
          echo "Generated tags: ${TAGS}"

      - name: Log in to GitHub Container Registry
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login $REGISTRY -u ${{ github.actor }} --password-stdin

      - name: Copy shared logging library into build context
        run: cp -r ../observability/log_config ./log_config

      - name: Build Docker image
        run: |
          IFS=',' read -ra TAG_ARRAY <<< "${{ steps.tags.outputs.tags }}"
          BUILD_CMD="docker build ${BUILD_ARGS}"
          for tag in "${TAG_ARRAY[@]}"; do
            BUILD_CMD+=" -t $tag"
          done
          BUILD_CMD+=" ."
          echo "Running: $BUILD_CMD"
          eval $BUILD_CMD

      - name: Push Docker image
        run: |
          IFS=',' read -ra TAG_ARRAY <<< "${{ steps.tags.outputs.tags }}"
          for tag in "${TAG_ARRAY[@]}"; do
            docker push "$tag"
          done
