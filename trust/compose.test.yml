# Compose stack used by trust-api / data-access-api integration tests (issue #369, B3).
#
# Brings up a throwaway omop-db (vanilla Postgres seeded from a fixture .sql) plus the
# data-access-api built from source. The trust-api side runs in-process inside pytest —
# the test imports task_handlers.handle_cohort_query and dispatches it directly. This
# keeps the stack to two services (fast bring-up) while still exercising the real
# trust-api → data-access-api → omop-db chain over HTTP and SQL.
#
# Conventions:
# - All published ports use ephemeral host bindings (":<container_port>"). Tests look up
#   the bound host port via Testcontainers' DockerCompose.get_service_port() so multiple
#   test runs on the same host don't collide.
# - The seed SQL is mounted into the postgres init dir so the schema and data are loaded
#   on first container start. The container is created and torn down per pytest session.
# - All env values here are deliberately hard-coded test values, not template references
#   to .env.development. The compose file must run identically in CI and locally without
#   any ambient env file.

services:
  omop-db-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: test_omop_db
    ports:
      - "5432"
    volumes:
      - ./trust-api/tests/integration/fixtures/omop_seed.sql:/docker-entrypoint-initdb.d/omop_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d test_omop_db"]
      interval: 1s
      timeout: 3s
      retries: 30

  data-access-api-test:
    build:
      context: ./data-access-api
      dockerfile: Dockerfile
      target: development
      args:
        UID: "1000"
        GID: "1000"
        UNAME: "appuser"
        DEBUG_PORT: "5678"
    depends_on:
      omop-db-test:
        condition: service_healthy
    environment:
      OMOP_DB_SERVICE_NAME: omop-db-test
      OMOP_DB_PORT: "5432"
      DATA_ACCESS_POSTGRES_USER: test_user
      DATA_ACCESS_POSTGRES_PASSWORD: test_password
      OMOP_POSTGRES_DB: test_omop_db
      AES_KEY_BASE64: "QgZ+TBA0lUxcuCiRPLneFe/JjMaUEUJWHACHHGz2gGA="  # pragma: allowlist secret
      # Use the production entrypoint branch (`fastapi run`) so the test stack
      # doesn't pay the dev/--reload startup cost or trip on file-watcher quirks
      # under Docker — the integration suite never edits source between requests.
      ENV: production
      DEBUG: "false"
      LOG_LEVEL: INFO
      TRUST_INTERNAL_SERVICE_KEY_HEADER: X-Trust-Internal-Service-Key
      # Must match the value pre-set in trust/trust-api/tests/conftest.py so the
      # in-process trust-api side and the containerised data-access-api use the
      # same per-trust shared secret on every /cohort call.
      TRUST_INTERNAL_SERVICE_KEY: "test-trust-internal-service-key"  # pragma: allowlist secret
      COHORT_QUERY_THRESHOLD: "10"
    ports:
      - "8000"
    volumes:
      - ./data-access-api/data_access_api:/app/data_access_api
      - ./observability/log_config:/app/log_config:ro
    healthcheck:
      # Targets the canonical /health route (no trailing slash) so the check doesn't
      # depend on FastAPI's redirect_slashes default. urllib raises on non-2xx.
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()\""]
      interval: 2s
      timeout: 3s
      retries: 30
