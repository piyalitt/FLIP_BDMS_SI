# NOTE Important: any sections specified in base configs will be overridden if you specify the same sections in the
# inheriting service configs below

services:

  # --- Application services ---

  omop-db:
    image: ghcr.io/londonaicentre/omop-db:latest
    restart: always
    ports:
      - "${OMOP_DB_PORT}:5432"
    environment:
      POSTGRES_USER: ${OMOP_POSTGRES_USER}
      POSTGRES_PASSWORD: ${OMOP_POSTGRES_PASSWORD}
      POSTGRES_DB: ${OMOP_POSTGRES_DB}
    volumes:
      - ./omop-db/volumes/${TRUST_NAME}/db_data:/var/lib/postgresql/data

  orthanc:
    build:
      context: ./orthanc
      dockerfile: Dockerfile
    restart: always
    ports:
      # - "${PACS_DICOM_PORT}:4242"
      - "${PACS_UI_PORT}:8042"
    volumes:
      - ./orthanc/${ORTHANC_STORAGE}:/var/lib/orthanc/db
    environment:
      ORTHANC__REGISTERED_USERS: |
          {"${ORTHANC_USERNAME}": "${ORTHANC_PASSWORD}"}
      ORTHANC__DICOM_MODALITIES: |
          {"XNAT": {"AET": "XNAT", "Host": "xnat-web", "Port": "${XNAT_PORT}"}}

  imaging-api:
    build:
      args:
        UID: ${UID}
        GID: ${GID}
        UNAME: ${UNAME}
        DEBUG_PORT: ${IMAGING_DEBUG_PORT_TRUST_1}
      context: ./imaging-api
      dockerfile: Dockerfile
      target: development
    # No ports here: trust 1 instance declares its own host port in its override file (compose_trust-1_override.yml) for 
    # debugging purposes
    environment:
      XNAT_URL: ${XNAT_URL}
      XNAT_PORT: ${XNAT_PORT}
      XNAT_SERVICE_USER: ${XNAT_SERVICE_USER}
      XNAT_SERVICE_PASSWORD: ${XNAT_SERVICE_PASSWORD}
      PACS_ID: ${PACS_ID}
      XNAT_DATABASE_URL: ${XNAT_DATABASE_URL}
      DATA_ACCESS_API_URL: ${DATA_ACCESS_API_URL}
      AES_KEY_BASE64: ${AES_KEY_BASE64}
      DEBUG_PORT: ${IMAGING_DEBUG_PORT_TRUST_1}
      DEBUG: ${DEBUG}
      ENV: development
      BASE_IMAGES_DOWNLOAD_DIR: /app/data/images
      LOG_LEVEL: ${TRUST_LOG_LEVEL}
    # NOTE the volume BASE_IMAGES_DOWNLOAD_DIR is mounted to share images downloaded from XNAT with FL clients
    volumes:
      - ./imaging-api/imaging_api:/app/imaging_api
      - ./imaging-api/tests:/app/tests
      - ${BASE_IMAGES_DOWNLOAD_DIR}:/app/data/images
      - ./observability/log_config:/app/log_config:ro

  data-access-api:
    build:
      args:
        UID: ${UID}
        GID: ${GID}
        UNAME: ${UNAME}
        DEBUG_PORT: ${DATA_ACCESS_DEBUG_PORT_TRUST_1}
      context: ./data-access-api
      dockerfile: Dockerfile
      target: development
    # No ports here: trust 1 instance declares its own host port in its override file (compose_trust-1_override.yml) for 
    # debugging purposes
    environment:
      OMOP_DB_SERVICE_NAME: ${OMOP_DB_SERVICE_NAME}
      DATA_ACCESS_POSTGRES_USER: ${DATA_ACCESS_POSTGRES_USER}
      DATA_ACCESS_POSTGRES_PASSWORD: ${DATA_ACCESS_POSTGRES_PASSWORD}
      OMOP_POSTGRES_DB: ${OMOP_POSTGRES_DB}
      AES_KEY_BASE64: ${AES_KEY_BASE64}
      DEBUG_PORT: ${DATA_ACCESS_DEBUG_PORT_TRUST_1}
      DEBUG: ${DEBUG}
      ENV: development
      LOG_LEVEL: ${TRUST_LOG_LEVEL}
    volumes:
      - ./data-access-api/data_access_api:/app/data_access_api
      - ./data-access-api/tests:/app/tests
      - ./observability/log_config:/app/log_config:ro

  trust-api:
    build:
      args:
        UID: ${UID}
        GID: ${GID}
        UNAME: ${UNAME}
        DEBUG_PORT: ${TRUST_DEBUG_PORT}
      context: ./trust-api
      dockerfile: Dockerfile
      target: development
    # No ports here: trust 1 instance declares its own host port in its override file (compose_trust-1_override.yml) for 
    # debugging purposes
    environment:
      CENTRAL_HUB_API_URL: ${CENTRAL_HUB_API_URL}
      DATA_ACCESS_API_URL: ${DATA_ACCESS_API_URL}
      IMAGING_API_URL: ${IMAGING_API_URL}
      DEBUG_PORT: ${TRUST_DEBUG_PORT}
      DEBUG: ${DEBUG}
      PRIVATE_API_KEY_HEADER: ${PRIVATE_API_KEY_HEADER}
      PRIVATE_API_KEY: ${PRIVATE_API_KEY}
      TRUST_NAME: Trust_${TRUST_NUMBER}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS}
      ENV: development
      LOG_LEVEL: ${TRUST_LOG_LEVEL}
    volumes:
      - ./trust-api/trust_api:/app/trust_api
      - ./trust-api/tests:/app/tests
      - ./observability/log_config:/app/log_config:ro
    networks:
      - default
      - central-hub-trust-apis-network

  # --- Observability infrastructure ---

  loki:
    image: grafana/loki:3.4.0
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "${LOKI_PORT}:3100"
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki

  alloy:
    image: grafana/alloy:v1.9.0
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - /etc/alloy/config.alloy
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.5.0
    ports:
      - "${GRAFANA_PORT}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - loki

volumes:
  loki-data:
  grafana-data:

networks:
  default:
    external: true
    name: ${TRUST_NETWORK_NAME}
  central-hub-trust-apis-network:
    external: true
  deploy_shared-net-1:
    external: true
  deploy_shared-net-2:
    external: true
