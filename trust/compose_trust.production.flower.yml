# NOTE Important: any sections specified in base configs will be overridden if you specify the same sections in the
# inheriting service configs below

services:

  fl-client-net-1:
    image: ghcr.io/londonaicentre/${DOCKER_FL_CLIENT_NAME}:${DOCKER_FL_TAG}
    volumes:
      # Mount the base images download directory to share images downloaded from XNAT with FL clients
      - ${BASE_IMAGES_DOWNLOAD_DIR}:/app/data/images
    environment:
      - NET_ID=net-1
      - SUPERNODE_NAME=${TRUST_NAME}
      - NUM_AVAILABLE_GPUS=${NUM_AVAILABLE_GPUS}
      - MEMORY_PER_GPU_IN_GIB=${MEMORY_PER_GPU_IN_GIB}
      - LOCAL_DEV=false
      - MIN_CLIENTS=${MIN_CLIENTS}
      - IMAGES_DIR=/app/data/images
      - UPLOADED_FEDERATED_DATA_BUCKET=${UPLOADED_FEDERATED_DATA_BUCKET}
      # FL clients intentionally do not have access to Central Hub API credentials.
      # Only the fl-server (on the Central Hub) communicates with flip-api via INTERNAL_SERVICE_KEY.
      - DATA_ACCESS_API_URL=${DATA_ACCESS_API_URL}
      - IMAGING_API_URL=${IMAGING_API_URL}
    command:
      - --insecure
      - --superlink
      - fl-server-net-1:9092
      - --health-server-address
      - 0.0.0.0:9098
    shm_size: '8gb'
    # gpus: all

networks:
  default:
    external: true
    name: ${TRUST_NETWORK_NAME}
