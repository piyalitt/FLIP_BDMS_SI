# NOTE Important: any sections specified in base configs will be overridden if you specify the same sections in the
# inheriting service configs below

services:

  # --- Application services ---

  omop-db:
    image: ghcr.io/londonaicentre/omop-db:stag
    restart: always
    ports:
      - "${OMOP_DB_PORT}:5432"
    environment:
      POSTGRES_USER: ${OMOP_POSTGRES_USER}
      POSTGRES_PASSWORD: ${OMOP_POSTGRES_PASSWORD}
      POSTGRES_DB: ${OMOP_POSTGRES_DB}
    volumes:
      - /opt/flip/volumes/${TRUST_NAME}/db_data:/var/lib/postgresql/data

  orthanc:
    image: ghcr.io/londonaicentre/orthanc:${DOCKER_TAG}
    restart: always
    ports:
      # - "${PACS_DICOM_PORT}:4242"
      - "${PACS_UI_PORT}:8042"
    volumes:
      - /opt/flip/orthanc/${ORTHANC_STORAGE}:/var/lib/orthanc/db
    environment:
      ORTHANC__REGISTERED_USERS: |
          {"${ORTHANC_USERNAME}": "${ORTHANC_PASSWORD}"}
      ORTHANC__DICOM_MODALITIES: |
          {"XNAT": {"AET": "XNAT", "Host": "xnat-web", "Port": "${XNAT_PORT}"}}

  imaging-api:
    image: ghcr.io/londonaicentre/imaging-api:${DOCKER_TAG}
    # Override the default CMD so that the production image uses uvicorn directly
    # instead of `fastapi dev --reload-exclude` (which fails on older fastapi CLI versions).
    # The entrypoint.sh fix (uvicorn for non-debug mode) will remove the need for this
    # override once the next image build is pushed.
    command: ["uv", "run", "python", "-m", "uvicorn", "imaging_api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "${IMAGING_API_PORT}:8000"
    environment:
      XNAT_URL: ${XNAT_URL}
      XNAT_PORT: ${XNAT_PORT}
      XNAT_SERVICE_USER: ${XNAT_SERVICE_USER}
      XNAT_SERVICE_PASSWORD: ${XNAT_SERVICE_PASSWORD}
      PACS_ID: ${PACS_ID}
      XNAT_DATABASE_URL: ${XNAT_DATABASE_URL}
      DATA_ACCESS_API_URL: ${DATA_ACCESS_API_URL}
      AES_KEY_BASE64: ${AES_KEY_BASE64}
      DEBUG_PORT: ${IMAGING_DEBUG_PORT_TRUST_1}
      DEBUG: ${DEBUG}
      ENV: production
      BASE_IMAGES_DOWNLOAD_DIR: /app/data/images
      LOG_LEVEL: ${TRUST_LOG_LEVEL}
    # NOTE the volume BASE_IMAGES_DOWNLOAD_DIR is mounted to share images downloaded from XNAT with FL clients
    volumes:
      - ${BASE_IMAGES_DOWNLOAD_DIR}:/app/data/images

  data-access-api:
    image: ghcr.io/londonaicentre/data-access-api:${DOCKER_TAG}
    ports:
      - "${DATA_ACCESS_API_PORT}:8000"
    environment:
      OMOP_DB_SERVICE_NAME: ${OMOP_DB_SERVICE_NAME}
      DATA_ACCESS_POSTGRES_USER: ${DATA_ACCESS_POSTGRES_USER}
      DATA_ACCESS_POSTGRES_PASSWORD: ${DATA_ACCESS_POSTGRES_PASSWORD}
      OMOP_POSTGRES_DB: ${OMOP_POSTGRES_DB}
      AES_KEY_BASE64: ${AES_KEY_BASE64}
      DEBUG_PORT: ${DATA_ACCESS_DEBUG_PORT_TRUST_1}
      DEBUG: ${DEBUG}
      ENV: production
      LOG_LEVEL: ${TRUST_LOG_LEVEL}

  trust-api:
    image: ghcr.io/londonaicentre/trust-api:${DOCKER_TAG}
    ports:
      - "${TRUST_API_PORT}:8000"
    environment:
      CENTRAL_HUB_API_URL: ${CENTRAL_HUB_API_URL}
      DATA_ACCESS_API_URL: ${DATA_ACCESS_API_URL}
      IMAGING_API_URL: ${IMAGING_API_URL}
      DEBUG_PORT: ${TRUST_DEBUG_PORT}
      DEBUG: ${DEBUG}
      PRIVATE_API_KEY_HEADER: ${PRIVATE_API_KEY_HEADER}
      PRIVATE_API_KEY: ${PRIVATE_API_KEY}
      ENV: production
      LOG_LEVEL: ${TRUST_LOG_LEVEL}

  # --- Observability infrastructure ---

  loki:
    image: grafana/loki:3.4.0
    restart: always
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "${LOKI_PORT}:3100"
    volumes:
      - /opt/flip/config/observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - /opt/flip/volumes/loki:/loki

  alloy:
    image: grafana/alloy:v1.9.0
    restart: always
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - /etc/alloy/config.alloy
    volumes:
      - /opt/flip/config/observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.5.0
    restart: always
    ports:
      - "${GRAFANA_PORT}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - /opt/flip/volumes/grafana:/var/lib/grafana
      - /opt/flip/config/observability/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - loki

networks:
  default:
    external: true
    name: ${TRUST_NETWORK_NAME}
