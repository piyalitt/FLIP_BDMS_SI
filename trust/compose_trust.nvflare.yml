# NOTE Important: any sections specified in base configs will be overridden if you specify the same sections in the
# inheriting service configs below

services:

  fl-client-net-1:
    image: ghcr.io/londonaicentre/${DOCKER_FL_CLIENT_NAME}:${DOCKER_FL_TAG}
    volumes:
      # Mount the base images download directory to share images downloaded from XNAT with FL clients
      - ${BASE_IMAGES_DOWNLOAD_DIR}:/app/data/images
      # Provisioned NVFLARE secrets (certificates, fed_client.json)
      - ${FL_PROVISIONED_DIR}/net-1/services/Trust_${TRUST_NUMBER}/local:/app/local
      - ${FL_PROVISIONED_DIR}/net-1/services/Trust_${TRUST_NUMBER}/startup:/app/startup
      - ${FL_PROVISIONED_DIR}/net-1/services/Trust_${TRUST_NUMBER}/transfer:/app/transfer
    environment:
      - NET_ID=net-1
      - NUM_AVAILABLE_GPUS=${NUM_AVAILABLE_GPUS}
      - MEMORY_PER_GPU_IN_GIB=${MEMORY_PER_GPU_IN_GIB}
      - LOCAL_DEV=false
      - MIN_CLIENTS=${MIN_CLIENTS}
      - IMAGES_DIR=/app/data/images
      - UPLOADED_FEDERATED_DATA_BUCKET=${UPLOADED_FEDERATED_DATA_BUCKET}
      - CENTRAL_HUB_API_URL=${CENTRAL_HUB_API_URL}
      - DATA_ACCESS_API_URL=${DATA_ACCESS_API_URL}
      - IMAGING_API_URL=${IMAGING_API_URL}
      - PRIVATE_API_KEY_HEADER=${PRIVATE_API_KEY_HEADER}
      - PRIVATE_API_KEY=${PRIVATE_API_KEY}
    networks:
      - default
      - deploy_shared-net-1
    shm_size: '32gb'
    gpus: all

  fl-client-net-2:
    image: ghcr.io/londonaicentre/${DOCKER_FL_CLIENT_NAME}:${DOCKER_FL_TAG}
    volumes:
      # Mount the base images download directory to share images downloaded from XNAT with FL clients
      - ${BASE_IMAGES_DOWNLOAD_DIR}:/app/data/images
      # Provisioned NVFLARE secrets (certificates, fed_client.json)
      - ${FL_PROVISIONED_DIR}/net-2/services/Trust_${TRUST_NUMBER}/local:/app/local
      - ${FL_PROVISIONED_DIR}/net-2/services/Trust_${TRUST_NUMBER}/startup:/app/startup
      - ${FL_PROVISIONED_DIR}/net-2/services/Trust_${TRUST_NUMBER}/transfer:/app/transfer
    environment:
      - NET_ID=net-2
      - NUM_AVAILABLE_GPUS=${NUM_AVAILABLE_GPUS}
      - MEMORY_PER_GPU_IN_GIB=${MEMORY_PER_GPU_IN_GIB}
      - LOCAL_DEV=false
      - MIN_CLIENTS=${MIN_CLIENTS}
      - IMAGES_DIR=/app/data/images
      - UPLOADED_FEDERATED_DATA_BUCKET=${UPLOADED_FEDERATED_DATA_BUCKET}
      - CENTRAL_HUB_API_URL=${CENTRAL_HUB_API_URL}
      - DATA_ACCESS_API_URL=${DATA_ACCESS_API_URL}
      - IMAGING_API_URL=${IMAGING_API_URL}
      - PRIVATE_API_KEY_HEADER=${PRIVATE_API_KEY_HEADER}
      - PRIVATE_API_KEY=${PRIVATE_API_KEY}
    networks:
      - default
      - deploy_shared-net-2
    shm_size: '32gb'
    gpus: all