# NOTE Important: any sections specified in base configs will be overridden if you specify the same sections in the
# inheriting service configs below

services:
  #################### CENTRAL HUB FL ####################

  fl-api-net-1:
    container_name: flip-fl-api-net-1
    image: ${DOCKER_REGISTRY}${DOCKER_FL_API_NAME}:${DOCKER_FL_TAG}
    environment:
      # Use the internal hostnames and ports for the server since the API is within the same Docker network
      - SUPERLINK_ADDRESS=fl-server-net-1:9093
      - SUPERLINK_HEALTH_ADDRESS=fl-server-net-1:9097
      # AWS update_env.py writes the Trust public-IP health endpoint(s) here for FL API check_client_status endpoint.
      - SUPERNODE_HEALTH_ADDRESSES=${SUPERNODE_HEALTH_ADDRESSES}
      - FLOWER_HEALTHCHECK_TIMEOUT_SECONDS=5.0
    ports:
      - "${FL_API_PORT}:8000"
    depends_on:
      - fl-server-net-1
    restart: unless-stopped

  fl-server-net-1:
    container_name: fl-server-net-1
    image: ${DOCKER_REGISTRY}${DOCKER_FL_SERVER_NAME}:${DOCKER_FL_TAG}
    environment:
      - NET_ID=net-1
      - LOCAL_DEV=false
      - MIN_CLIENTS=${MIN_CLIENTS}
      - IMAGES_DIR=/app/data/images
      - UPLOADED_FEDERATED_DATA_BUCKET=${UPLOADED_FEDERATED_DATA_BUCKET}
      - CENTRAL_HUB_API_URL=${CENTRAL_HUB_API_URL}
      - DATA_ACCESS_API_URL=${DATA_ACCESS_API_URL}
      - IMAGING_API_URL=${IMAGING_API_URL}
      - PRIVATE_API_KEY_HEADER=${PRIVATE_API_KEY_HEADER}
      - PRIVATE_API_KEY=${PRIVATE_API_KEY}
      # - AWS_PROFILE=${AWS_PROFILE} # in production, AWS credentials are retrieved from the instance role
    command:
      # TODO Replace --insecure with Flower TLS configuration for production so
      # remote Trust supernodes connect to the SuperLink over authenticated encryption.
      - --insecure
      - --health-server-address
      - 0.0.0.0:9097
    ports:
      - "${FL_SERVER_PORT}:9092"
    restart: unless-stopped
    init: true

  # One-shot service to register SuperNode public keys with the SuperLink
  register-supernode-keys-net-1:
    container_name: register-supernode-keys-net-1
    image: ${DOCKER_REGISTRY}${DOCKER_FL_SERVER_NAME}:${DOCKER_FL_TAG}
    environment:
      - SUPERLINK_ADDRESS=fl-server-net-1:9093
    volumes:
      - /opt/flip/services/net-1/certificates:/certs:ro
      - /opt/flip/services/net-1/keys:/keys:ro
    entrypoint: ["/bin/bash", "/scripts/register-supernode-keys.sh"]
    depends_on:
      - fl-server-net-1
