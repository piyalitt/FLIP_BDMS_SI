# NOTE Important: any sections specified in base configs will be overridden if you specify the same sections in the
# inheriting service configs below

services:
  #################### CENTRAL HUB ####################

  flip-ui:
    build:
      args:
        UI_PORT: ${UI_PORT}
      context: ../flip-ui
      dockerfile: Dockerfile
    ports:
      - "${UI_PORT}:443"
    volumes:
      - ../flip-ui:/app
      - /app/node_modules
      - ~/.aws/config:/root/.aws/config:ro
      - ~/.aws/sso/cache:/root/.aws/sso/cache
    environment:
      - NODE_ENV=${NODE_ENV}
      - VITE_LOCAL=${VITE_LOCAL}
      - VITE_AWS_BASE_URL=${VITE_AWS_BASE_URL}
      - VITE_AWS_USER_POOL_ID=${AWS_COGNITO_USER_POOL_ID}
      - VITE_AWS_CLIENT_ID=${AWS_COGNITO_APP_CLIENT_ID}
      - VITE_AWS_REGION=${AWS_REGION}
      - VITE_BLACKLISTED_MODEL_FILES=${VITE_BLACKLISTED_MODEL_FILES}
    restart: unless-stopped
    networks:
      - default
    container_name: flip-ui

  flip-api:
    platform: linux/x86_64
    build:
      args:
        UID: ${UID}
        GID: ${GID}
        UNAME: ${UNAME}
      context: ../flip-api
      dockerfile: Dockerfile
      target: development
    ports:
      - "${API_PORT}:8000"
      - 5678:5678
    depends_on:
      - flip-db
    volumes:
      - ../flip-api/src/:/app/src/
      - ../flip-api/entrypoint.sh:/app/entrypoint.sh
      - ../flip-api/tests/:/app/tests/
      - ../flip-api/.vscode:/app/.vscode
      - ~/.aws/config:/home/${UNAME}/.aws/config:ro
      - ~/.aws/sso/cache:/home/${UNAME}/.aws/sso/cache:rw
    networks:
      - default
      - central-hub-trust-apis-network
      - shared-net-1
      - shared-net-2
    environment:
      - ENV=development
      - DEBUG=${DEBUG}
      - AWS_PROFILE=${AWS_PROFILE}
      - AWS_REGION=${AWS_REGION}
      - AWS_COGNITO_USER_POOL_ID=${AWS_COGNITO_USER_POOL_ID}
      - AWS_COGNITO_APP_CLIENT_ID=${AWS_COGNITO_APP_CLIENT_ID}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - TRUST_API_KEY_HEADER=${TRUST_API_KEY_HEADER}
      - TRUST_API_KEY_HASHES=${TRUST_API_KEY_HASHES}
      - INTERNAL_SERVICE_KEY_HEADER=${INTERNAL_SERVICE_KEY_HEADER}
      - INTERNAL_SERVICE_KEY_HASH=${INTERNAL_SERVICE_KEY_HASH}
      - AES_KEY_BASE64=${AES_KEY_BASE64}
      - AWS_SECRET_NAME=${AWS_SECRET_NAME}
      - AWS_SES_ADMIN_EMAIL_ADDRESS=${AWS_SES_ADMIN_EMAIL_ADDRESS}
      - AWS_SES_SENDER_EMAIL_ADDRESS=${AWS_SES_SENDER_EMAIL_ADDRESS}
      - UPLOADED_MODEL_FILES_BUCKET=${UPLOADED_MODEL_FILES_BUCKET}
      - SCANNED_MODEL_FILES_BUCKET=${SCANNED_MODEL_FILES_BUCKET}
      - UPLOADED_FEDERATED_DATA_BUCKET=${UPLOADED_FEDERATED_DATA_BUCKET}
      - FL_APP_BASE_BUCKET=${FL_APP_BASE_BUCKET}
      - FL_APP_DESTINATION_BUCKET=${FL_APP_DESTINATION_BUCKET}
      - NET_ENDPOINTS=${NET_ENDPOINTS}
      - FL_BACKEND=${FL_BACKEND}
      - ADMIN_USER_PASSWORD=${ADMIN_USER_PASSWORD}
      - TRUST_NAMES=${TRUST_NAMES}
    restart: unless-stopped
    container_name: flip-api

  flip-db:
    image: postgres:17
    ports:
      - ${DB_PORT}:${DB_PORT}
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - default
    container_name: flip-db

  #################### PGADMIN ####################

  pgadmin:
    image: dpage/pgadmin4:9
    restart: always
    ports:
      - "${PGADMIN_PORT}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - default
      - trust-network-1
      - trust-network-2
    container_name: flip-pgadmin

volumes:
  pgadmin_data:

networks:
  default:
    external: true
    name: central-hub-network
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: "central-hub-network"
      com.docker.network.bridge.host_binding_ipv4: "127.0.0.1"

  # Shared network for trust-to-hub communication (outbound from trust only).
  # Trusts poll the hub for tasks and push results back — no inbound connections to trusts.
  central-hub-trust-apis-network:
    external: true
    name: central-hub-trust-apis-network
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: "central-hub-trust-apis-network"
      com.docker.network.bridge.host_binding_ipv4: "127.10.0.1"

  trust-network-1:
    external: true
    name: deploy_trust-network-1
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: "deploy_trust-network-1"
      com.docker.network.bridge.host_binding_ipv4: "127.20.0.1"

  trust-network-2:
    external: true
    name: deploy_trust-network-2
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: "deploy_trust-network-2"
      com.docker.network.bridge.host_binding_ipv4: "127.30.0.1"

  shared-net-1:
    external: true
    name: deploy_shared-net-1
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: "deploy_shared-net-1"
      com.docker.network.bridge.host_binding_ipv4: "127.40.0.1"

  shared-net-2:
    external: true
    name: deploy_shared-net-2
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: "deploy_shared-net-2"
      com.docker.network.bridge.host_binding_ipv4: "127.50.0.1"
