# site_local_trust.yml
#
# Provisions an on-premises Ubuntu host to run the FLIP Trust-API stack.
# Trusts poll the Central Hub for tasks — all communication is outbound.
#
# Usage:
#   ansible-playbook -i <trust-host-ip>, \
#     -u ubuntu --private-key ~/.ssh/trust_key \
#     deploy/providers/local/site_local_trust.yml \
#     -e trust_public_ip=<public-ip-or-hostname> \
#     -e ch_public_ip=<aws-ec2-public-ip>

---
- name: Configure on-premises Trust host
  hosts: all
  become: true
  vars:
    flip_dir: /opt/flip

  pre_tasks:
    - name: Assert required variables are set
      assert:
        that:
          - trust_public_ip is defined and trust_public_ip | length > 0
          - ch_public_ip is defined and ch_public_ip | length > 0
        fail_msg: "trust_public_ip and ch_public_ip must be provided via -e"

  tasks:
    # ── System packages ──────────────────────────────────────────────────────
    - name: Install required packages
      apt:
        name:
          - openssl
          - ufw
          - curl
          - python3-cryptography  # required by community.crypto
        state: present
        update_cache: yes

    # ── Docker ───────────────────────────────────────────────────────────────
    - name: Install Docker
      include_role:
        name: geerlingguy.docker
      vars:
        docker_users: [ubuntu]

    # ── Application directories ───────────────────────────────────────────────
    - name: Create application directories
      file:
        path: "{{ item }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"
      loop:
        - "{{ flip_dir }}"
        - "{{ flip_dir }}/data/images"
        # XNAT bind-mount directories (Docker Swarm does not auto-create them)
        - "{{ flip_dir }}/xnat"
        - "{{ flip_dir }}/xnat/xnat-data/tomcat_logs"
        - "{{ flip_dir }}/xnat/xnat-data/archive"
        - "{{ flip_dir }}/xnat/xnat-data/build"
        - "{{ flip_dir }}/xnat/xnat-data/cache"

    - name: Create FL client kit directories
      file:
        path: "{{ item }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"
      loop:
        - "/opt/flip/services"
        - "/opt/flip/services/Trust_2"
        - "/opt/flip/services/Trust_2/startup"
        - "/opt/flip/services/Trust_2/local"
        - "/opt/flip/services/Trust_2/transfer"

    # ── Firewall ─────────────────────────────────────────────────────────────
    # Add all allow rules BEFORE enabling UFW with default-deny to avoid
    # locking out the operator on a remote host mid-playbook.

    - name: Allow SSH (prevent operator lockout)
      community.general.ufw:
        rule: allow
        port: "22"
        proto: tcp
        comment: SSH access

    - name: Allow FL Server port 8002 from Central Hub
      community.general.ufw:
        rule: allow
        src: "{{ ch_public_ip }}"
        port: "8002"
        proto: tcp
        comment: "FL Server port from AWS CH"

    - name: Allow FL Admin port 8003 from Central Hub
      community.general.ufw:
        rule: allow
        src: "{{ ch_public_ip }}"
        port: "8003"
        proto: tcp
        comment: "FL Admin port from AWS CH"

    - name: Allow SSH from Central Hub IP
      community.general.ufw:
        rule: allow
        src: "{{ ch_public_ip }}"
        port: "22"
        proto: tcp
        comment: "SSH from AWS CH for remote provisioning"

    - name: Set UFW default policy — deny incoming
      community.general.ufw:
        policy: deny
        direction: incoming

    - name: Set UFW default policy — allow outgoing
      community.general.ufw:
        policy: allow
        direction: outgoing

    - name: Enable UFW
      community.general.ufw:
        state: enabled

