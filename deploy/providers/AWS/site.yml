---
- name: create EC2 Ansible inventory hosts on-the-fly
  hosts: localhost
  gather_facts: false
  tasks:
    - name: ensure flip_aicentre_bucket variable is defined
      assert:
        that:
          - flip_aicentre_bucket is defined
          - flip_aicentre_bucket | length > 0
        fail_msg: "The flip_aicentre_bucket variable must be defined to proceed."
    - name: ensure fl_kit_date variable is defined
      assert:
        that:
          - fl_kit_date is defined
          - fl_kit_date | length > 0
        fail_msg: "The fl_kit_date variable must be defined to proceed."
    - name: ensure pgdata_archive variable is defined
      assert:
        that:
          - pgdata_archive is defined
          - pgdata_archive | length > 0
        fail_msg: "The pgdata_archive variable must be defined to proceed (e.g. trust1_pgdata_20260106.tar.gz)."
    - name: use plugin to extract Terraform outputs
      community.general.terraform:
        state: present
        project_path: "./"
      register: terraform_output
    - name: add Central Hub EC2 instance to Ansible inventory
      add_host:
        # Use the SSH alias so Ansible tunnels through SSM Session Manager
        # The 'flip' Host entry in ~/.ssh/config provides ProxyCommand, IdentityFile,
        # and StrictHostKeyChecking=accept-new — no additional ssh_common_args needed.
        name: flip
        groups:
          - ec2
          - central_hub
        ansible_ssh_user: ubuntu
        ansible_ssh_private_key_file: "{{ lookup('env', 'HOME') + '/.ssh/host-aws' }}"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new"
        ansible_ec2_instance_id: "{{ terraform_output.outputs.Ec2InstanceId.value }}"
    - name: add Trust EC2 instance to Ansible inventory
      add_host:
        # Use the SSH alias so Ansible tunnels through SSM Session Manager
        name: flip-trust
        groups:
          - ec2
          - trust_ec2
        ansible_ssh_user: ubuntu
        ansible_ssh_private_key_file: "{{ lookup('env', 'HOME') + '/.ssh/host-aws' }}"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new"
        ansible_ec2_instance_id: "{{ terraform_output.outputs.TrustEc2InstanceId.value }}"

- name: update packages
  hosts: ec2
  become: true
  tasks:
    - name: update and upgrade apt packages
      apt:
        upgrade: yes
        update_cache: yes

- name: reboot if kernel update requires it
  hosts: ec2
  become: true
  tasks:
    - name: check if reboot is required
      stat:
        path: /run/reboot-required
      register: reboot_required_file

    - name: reboot and wait for EC2 to come back
      reboot:
        reboot_timeout: 300
        post_reboot_delay: 30
      when: reboot_required_file.stat.exists

- name: install docker, adding ubuntu to docker group
  hosts: ec2
  become: true
  roles:
    - geerlingguy.docker
  vars:
    docker_users: [ubuntu]

- name: install AWS CLI v2 on EC2 instances (if missing)
  hosts: ec2
  become: true
  tasks:
    - name: install prerequisites for AWS CLI
      apt:
        name:
          - curl
          - unzip
        state: present
        update_cache: yes

    - name: check if aws cli is already installed
      command: aws --version
      register: awscli_check
      changed_when: false
      failed_when: false

    - name: download AWS CLI v2 installer
      get_url:
        url: https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip
        dest: /tmp/awscliv2.zip
      when: awscli_check.rc != 0

    - name: unzip AWS CLI installer
      unarchive:
        src: /tmp/awscliv2.zip
        dest: /tmp
        remote_src: true
      when: awscli_check.rc != 0

    - name: install AWS CLI v2
      command: /tmp/aws/install
      when: awscli_check.rc != 0

- name: create Central Hub application directories, create data directory for FL server and change ownership
  hosts: central_hub
  become: true
  tasks:
    - name: create Central Hub application directories
      file:
        path: "{{ item }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"
      loop:
        - /opt/flip
        - /opt/flip/data

- name: download NVFLARE participant kit to Central Hub
  hosts: central_hub
  become: true
  vars:
    central_services_dir: "/opt/flip/services"
    central_s3_sources:
      - "s3://{{ flip_aicentre_bucket }}/fl-flare-participant-kits/{{ fl_kit_date }}/net-1/services/fl-server-net-1/"
      - "s3://{{ flip_aicentre_bucket }}/fl-flare-participant-kits/{{ fl_kit_date }}/net-1/services/flip-fl-api-net-1/"
  tasks:
    - name: ensure central services directory exists
      file:
        path: "{{ central_services_dir }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"
      when: fl_backend == "nvflare"

    - name: sync NVFLARE participant kit from S3
      shell: |
        set -euo pipefail
        src="{{ item }}"
        name="$(basename "${src%/}")"
        dest="{{ central_services_dir }}/${name}"
        mkdir -p "$dest"
        aws s3 sync "$src" "$dest"
      args:
        executable: /bin/bash
      loop: "{{ central_s3_sources }}"
      register: central_sync
      changed_when: "'download:' in central_sync.stdout or 'copy:' in central_sync.stdout"
      when: fl_backend == "nvflare"

- name: download Flower participant kit to Central Hub
  hosts: central_hub
  become: true
  vars:
    central_services_dir: "/opt/flip/services"
    central_s3_source: "s3://{{ flip_aicentre_bucket }}/fl-flower-participant-kits/{{ fl_kit_date }}/net-1/"
  tasks:
    - name: ensure central services directory exists
      file:
        path: "{{ central_services_dir }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"
      when: fl_backend == "flower"

    - name: sync Flower net-1 certificates and keys from S3
      shell: |
        set -euo pipefail
        mkdir -p "{{ central_services_dir }}/net-1"
        aws s3 sync \
          "{{ central_s3_source }}" \
          "{{ central_services_dir }}/net-1/"
      args:
        executable: /bin/bash
      register: cert_sync
      changed_when: "'download:' in cert_sync.stdout or 'copy:' in cert_sync.stdout"
      when: fl_backend == "flower"

- name: create Trust EC2 application directories
  hosts: trust_ec2
  become: true
  tasks:
    - name: create Trust application directories
      file:
        path: "{{ item }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"
      loop:
        - /opt/flip
        # Data directory for Trust 1 (where XNAT images will be downloaded for the FL client to use)
        # NOTE if this is not created here, it will be created later by Docker Compose but owned by root, and will cause permission issues
        - /opt/flip/data/images
        # XNAT bind-mount directories (Docker Swarm does not auto-create them)
        - /opt/flip/xnat
        - /opt/flip/xnat/xnat-data/tomcat_logs
        - /opt/flip/xnat/xnat-data/archive
        - /opt/flip/xnat/xnat-data/build
        - /opt/flip/xnat/xnat-data/cache
        - /opt/flip/xnat/xnat-db-data

    - name: create Loki data directory
      file:
        path: /opt/flip/volumes/loki
        state: directory
        owner: "10001"
        group: "10001"
        mode: "0755"

    - name: create Grafana data directory
      file:
        path: /opt/flip/volumes/grafana
        state: directory
        owner: "472"
        group: "472"
        mode: "0755"

- name: download NVFLARE participant kit services to Trust EC2
  hosts: trust_ec2
  become: true
  vars:
    trust_services_dir: "/opt/flip/services"
    trust_s3_source: "s3://{{ flip_aicentre_bucket }}/fl-flare-participant-kits/{{ fl_kit_date }}/net-1/services/Trust_1/"
  tasks:
    - name: ensure trust services directory exists
      file:
        path: "{{ trust_services_dir }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"
      when: fl_backend == "nvflare"

    - name: sync NVFLARE Trust_1 participant kit from S3
      shell: |
        set -euo pipefail
        dest="{{ trust_services_dir }}/Trust_1"
        mkdir -p "$dest"
        aws s3 sync \
          "{{ trust_s3_source }}" \
          "$dest"
      args:
        executable: /bin/bash
      register: trust_sync
      changed_when: "'download:' in trust_sync.stdout or 'copy:' in trust_sync.stdout"
      when: fl_backend == "nvflare"

- name: download Flower participant kit to Trust EC2
  hosts: trust_ec2
  become: true
  vars:
    trust_services_dir: "/opt/flip/services"
    trust_s3_source: "s3://{{ flip_aicentre_bucket }}/fl-flower-participant-kits/{{ fl_kit_date }}/net-1/"
  tasks:
    - name: ensure trust services directory exists
      file:
        path: "{{ trust_services_dir }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"
      when: fl_backend == "flower"

    - name: sync Flower net-1 certificates and keys from S3
      shell: |
        set -euo pipefail
        mkdir -p "{{ trust_services_dir }}/net-1"
        aws s3 sync \
          "{{ trust_s3_source }}/" \
          "{{ trust_services_dir }}/net-1/"
      args:
        executable: /bin/bash
      register: trust_sync
      changed_when: "'download:' in trust_sync.stdout or 'copy:' in trust_sync.stdout"
      when: fl_backend == "flower"

- name: deploy observability config files to Trust EC2
  hosts: trust_ec2
  become: true
  tasks:
    - name: create observability config directories
      file:
        path: "{{ item }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"
      loop:
        - /opt/flip/config/observability
        - /opt/flip/config/observability/alloy
        - /opt/flip/config/observability/loki
        - /opt/flip/config/observability/grafana/provisioning/datasources
        - /opt/flip/config/observability/grafana/provisioning/dashboards

    - name: copy Alloy config
      copy:
        src: ../../../trust/observability/alloy/config.alloy
        dest: /opt/flip/config/observability/alloy/config.alloy
        owner: ubuntu
        group: ubuntu
        mode: "0644"

    - name: copy Loki config
      copy:
        src: ../../../trust/observability/loki/loki-config.yml
        dest: /opt/flip/config/observability/loki/loki-config.yml
        owner: ubuntu
        group: ubuntu
        mode: "0644"

    - name: copy Grafana Loki datasource provisioning
      copy:
        src: ../../../trust/observability/grafana/provisioning/datasources/loki.yml
        dest: /opt/flip/config/observability/grafana/provisioning/datasources/loki.yml
        owner: ubuntu
        group: ubuntu
        mode: "0644"

    - name: copy Grafana dashboard provider config
      copy:
        src: ../../../trust/observability/grafana/provisioning/dashboards/dashboards.yml
        dest: /opt/flip/config/observability/grafana/provisioning/dashboards/dashboards.yml
        owner: ubuntu
        group: ubuntu
        mode: "0644"

    - name: copy Grafana Trust APIs dashboard
      copy:
        src: ../../../trust/observability/grafana/provisioning/dashboards/trust-apis.json
        dest: /opt/flip/config/observability/grafana/provisioning/dashboards/trust-apis.json
        owner: ubuntu
        group: ubuntu
        mode: "0644"

- name: install and configure CloudWatch agent on Central Hub
  hosts: central_hub
  become: true
  vars:
    cloudwatch_agent_deb: "https://s3.amazonaws.com/amazoncloudwatch-agent/ubuntu/amd64/latest/amazon-cloudwatch-agent.deb"
    log_group_name: "/aws/ec2/flip"
  tasks:
    - name: install prerequisites
      apt:
        name:
          - unzip
        state: present
        update_cache: yes
    - name: download CloudWatch agent package
      get_url:
        url: "{{ cloudwatch_agent_deb }}"
        dest: "/tmp/amazon-cloudwatch-agent.deb"
        mode: "0644"
    - name: install CloudWatch agent
      apt:
        deb: "/tmp/amazon-cloudwatch-agent.deb"
    - name: configure CloudWatch agent
      template:
        src: cloudwatch-agent.json.j2
        dest: /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json
        owner: root
        group: root
        mode: "0644"
    - name: start CloudWatch agent
      command: >
        /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl
        -a fetch-config -m ec2
        -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json -s

- name: install and configure CloudWatch agent on Trust EC2
  hosts: trust_ec2
  become: true
  vars:
    cloudwatch_agent_deb: "https://s3.amazonaws.com/amazoncloudwatch-agent/ubuntu/amd64/latest/amazon-cloudwatch-agent.deb"
    log_group_name: "/aws/ec2/flip-trust"
  tasks:
    - name: install prerequisites
      apt:
        name:
          - unzip
        state: present
        update_cache: yes
    - name: download CloudWatch agent package
      get_url:
        url: "{{ cloudwatch_agent_deb }}"
        dest: "/tmp/amazon-cloudwatch-agent.deb"
        mode: "0644"
    - name: install CloudWatch agent
      apt:
        deb: "/tmp/amazon-cloudwatch-agent.deb"
    - name: configure CloudWatch agent for Trust EC2
      template:
        src: cloudwatch-agent-trust.json.j2
        dest: /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json
        owner: root
        group: root
        mode: "0644"
    - name: start CloudWatch agent
      command: >
        /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl
        -a fetch-config -m ec2
        -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json -s

- name: download and restore OMOP PGDATA on Trust EC2
  hosts: trust_ec2
  become: true
  vars:
    s3_bucket: "{{ flip_aicentre_bucket }}"
    s3_prefix: "omop"
    omop_dir: "/opt/flip/omop"
  tasks:
    - name: install tar
      apt:
        name:
          - tar
        state: present
        update_cache: yes

    - name: create OMOP directories
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ omop_dir }}"
        - "{{ omop_dir }}/db_data"

    - name: download OMOP PGDATA archive from S3
      command: >
        aws s3 cp
        s3://{{ s3_bucket }}/{{ s3_prefix }}/{{ pgdata_archive }}
        {{ omop_dir }}/pgdata.tar.gz
      args:
        creates: "{{ omop_dir }}/pgdata.tar.gz"

    - name: clear existing PGDATA directory
      shell: rm -rf {{ omop_dir }}/db_data/*
      changed_when: false

    - name: extract OMOP PGDATA
      command: >
        tar -xzf {{ omop_dir }}/pgdata.tar.gz
        -C {{ omop_dir }}/db_data

    - name: set Postgres ownership and permissions
      shell: |
        chown -R 999:999 {{ omop_dir }}/db_data
        chmod 700 {{ omop_dir }}/db_data
      changed_when: false

- name: restore trust1 Orthanc storage on Trust EC2
  hosts: trust_ec2
  become: true
  vars:
    s3_bucket: "{{ flip_aicentre_bucket }}"
    s3_prefix: "orthanc"
    archive: "trust1_orthanc_data_20260106.tar.gz"
    base_dir: "/opt/flip/orthanc"
    data_dir: "/opt/flip/orthanc/orthanc-storage"
  tasks:
    - name: install tar
      apt:
        name:
          - tar
        state: present
        update_cache: yes

    - name: ensure orthanc base directory exists
      file:
        path: "{{ base_dir }}"
        state: directory
        mode: "0755"

    - name: download Orthanc archive from S3
      command: >
        aws s3 cp
        s3://{{ s3_bucket }}/{{ s3_prefix }}/{{ archive }}
        {{ base_dir }}/orthanc-storage.tar.gz
      args:
        creates: "{{ base_dir }}/orthanc-storage.tar.gz"

    - name: clear existing Orthanc storage
      shell: rm -rf {{ data_dir }}/*
      changed_when: false

    - name: ensure orthanc data directory exists
      file:
        path: "{{ data_dir }}"
        state: directory
        mode: "0755"

    - name: extract Orthanc data into orthanc-storage
      command: >
        tar -xzf {{ base_dir }}/orthanc-storage.tar.gz -C {{ data_dir }}

    - name: ensure Orthanc storage is writable
      file:
        path: "{{ data_dir }}"
        mode: "0755"
        recurse: true
